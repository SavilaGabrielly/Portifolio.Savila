<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integraçao</title>
    <style>
        .container{
            width: 400px;
            margin: 40px auto;
            background-color:rgb(121, 255, 255);
            padding: 20px;
            border-radius: 10px;
        }

        h2{
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, select{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        .radio-grupo{
            margin-top: 5px;
        }

        button{
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background-color: rgb(174, 253, 253);
            color: rgb(15, 117, 126);
            border: none;
            cursor: pointer;
        }

        #resultado{
            margin-top: 20px;
            padding: 10px;
            background-color: rgb(174, 253, 253);
            border-radius: 5px;
        }

        .erro{
            color: rgb(249, 30, 30);
        }

        .sucesso{
            color: chartreuse;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Atendimento</h2>

        <form id="formulario">
            
            <label>Nome:</label>
            <input type="text" id="nome">

            <label>Idade:</label>
            <input type="number" id="idade">

            <label>Tipo  de atendimento: </label>
            <select id="tipo">
                <option value="">Selecione:</option>
                <option value="Técnico">Técnico</option>
                <option value="Administrativo">Administrativo</option>
                <option value="Suporte">Suporte</option>
            </select>

            <label>Prioridade:</label>
            <div class="radio-grupo">
                <input type="radio" name="prioridade" value="Baixa"> Baixa
                <input type="radio" name="prioridade" value="Média"> Média
                <input type="radio" name="prioridade" value="Alta"> Alta
            </div>

            <button type="submit">Enviar</button>
        </form>

        <div id="resultado"></div>
    </div>

    <script>
        document.getElementById("formulario").addEventListener("submit", function(even){
            even.preventDefault();

            let nome = document.getElementById("nome").value
            let iade = document.getElementById("idade").value
            let tipo = document.getElementById("tipo").value

            let prioridadeSeleciona = document.querySelector('input[name="prioridade"]:checked')
            let prioridade = prioridadeSeleciona ? prioridadeSeleciona.value : "";

            let resultado = document.getElementById("resultado")

            if(nome === ""){
                resultado.innerHTML = "<p class='erro'>O nome é obrigatório!</p>"
                return
            }

            if(idade === "" || idade <0){
                resultado.innerHTML = "<p class='erro'>A idade está inválida!</p>"
                return
            }
            
            let mensagem = ""
            if(prioridade === "Alta"){
                mensagem += "Atendimento Urgente!<br>"
            }

            if(tipo === "Tecnico"){
                mensagem += "Encaminhar para equipe técnica.<br>"
            }

            if(idade < 18){
                mensagem += "Necessário Responsavel!<br>"
            }

            resultado.innerHTML = `
                <p class="sucesso"><strong>Resumo do atendimento:</strong></p>
                Nome: ${nome}<br>
                Idade: ${idade}<br>
                Tipo; ${tipo}<br>
                Prioridade: ${prioridade}<br><br>
                ${mensagem}
            `;
        });
    </script>
</body>
</html>
