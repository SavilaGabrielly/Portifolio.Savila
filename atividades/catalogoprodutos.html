<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo</title>

    <style>
        body {
            background-color: rgb(137, 241, 255);
            font-family: sans-serif;
            color: rgb(62, 62, 62);
        }

         div{
            background-color: rgb(96, 241, 241);
            padding: 15px;
            margin: 10px;
            border-bottom: 10PX solid rgb(189, 242, 255);
            border-radius: 20px;
            transition: 0.5s;
        }

         div:hover{
            box-shadow: 5px 10px rgb(0, 185, 206);;
        }

        a{
            text-decoration: none;
            color: black;
        }

        table{
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
            text-align: center;
        }

        td{
            padding: 10px;
        }

        tr:nth-child(even){
            background-color: rgb(96, 241, 241) ;
        }
        img{
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div>
        <h1>Catálogo de livros</h1>
    </div>

    <table border="1">
        <tr>
            <th>Imagem</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Link</th>
        </tr>

        <tr>
            <td>
                <img src="imagens/livro1.jpeg" alt="É assim que acaba" width="200">
            </td>
            <td>É assim que acaba</td>
            <td>R$59,90</td>
            <td>
                <a href="https://www.amazon.com.br/Assim-que-Acaba-Colleen-Hoover/dp/8501112518/ref=asc_df_8501112518?mcid=83bf79e5959532e1aad55107bfbed021&tag=googleshopp00-20&linkCode=df0&hvadid=721147801917&hvpos=&hvnetw=g&hvrand=4472386422382577859&hvpone=&hvptwo=&hvqmt=&hvdev=c&hvdvcmdl=&hvlocint=&hvlocphy=9101646&hvtargid=pla-2374768376294&psc=1&gad_source=1"
                    target="_blank">Link de compra</a>
            </td>
        </tr>

        <tr>
            <td>
                <img src="imagens/seleção.jpg" alt="A seleção" width="200">
            </td>
            <td>A Seleção</td>
            <td>R$69,90</td>
            <td>
                <a href="https://www.amazon.com.br/sele%C3%A7%C3%A3o-Kiera-Cass/dp/8565765016" target="_blank">Link de
                    compra</a>
            </td>
        </tr>

        <tr>
            <td>
                <img src="imagens/Livro3.jpg" alt="Percy Jackson" width="200">
            </td>
            <td>Percy Jackson: O ladrão de Raios</td>
            <td>R$240,99</td>
            <td>
                <a href="https://www.amazon.com.br/Ladr%C3%A3o-Raios-Rick-Riordan/dp/8598078395" target="_blank">Link de
                    compra</a>
            </td>
        </tr>
    </table>
</body>

</html>
